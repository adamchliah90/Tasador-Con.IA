<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Hub AI | AdamChliah</title>
    <style>
        :root { --gold: #f3ca10; --cyan: #00e5ff; --dark: #0f0f12; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        h1 { color: var(--gold); text-align: center; font-size: 2.8rem; text-shadow: 0 0 15px rgba(243, 202, 16, 0.4); margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; letter-spacing: 2px; }

        /* GRID DE BRAWLERS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; max-width: 1000px; margin: 0 auto; }
        .card { background: #1c1c21; border-radius: 25px; padding: 20px; border: 1px solid #333; text-align: center; transition: transform 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-10px); border-color: var(--cyan); }
        .brawler-img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        h3 { margin-top: 15px; font-size: 1.5rem; color: var(--cyan); }

        /* VENTANA DE CHAT FLOTANTE */
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 350px; background: #1c1c21; border: 2px solid var(--cyan); border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 15px 50px rgba(0,0,0,0.8); z-index: 1000; overflow: hidden; }
        #chat-header { background: var(--cyan); color: black; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; font-size: 0.95rem; background: #141417; }
        
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; line-height: 1.4; }
        .bot { background: #2d2d35; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--cyan); color: black; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        
        .chat-input-area { display: flex; padding: 15px; gap: 10px; background: #1c1c21; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #0b0b0d; color: white; outline: none; }
        input:focus { border-color: var(--cyan); }
        button { background: var(--cyan); border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #00b8cc; transform: scale(1.05); }

        /* Scrollbar tuneada */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>BRAWL <span style="color:white">HUB</span> AI</h1>
    <p class="subtitle">PROYECTO DE @ADAMCHLIAH90</p>

    <div class="grid">
        <div class="card">
            <img src="https://cdn.brawlify.com/brawlers/border/Edgar.png" class="brawler-img" alt="Edgar">
            <h3>Edgar</h3>
        </div>
        <div class="card">
            <img src="https://cdn.brawlify.com/brawlers/border/Mortis.png" class="brawler-img" alt="Mortis">
            <h3>Mortis</h3>
        </div>
        <div class="card">
            <img src="https://cdn.brawlify.com/brawlers/border/Leon.png" class="brawler-img" alt="Leon">
            <h3>Leon</h3>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-header">
            <span>🤖 BRAWL IA ADVISOR</span>
            <span style="font-size: 0.7rem; opacity: 0.7;">ONLINE</span>
        </div>
        <div id="chat-box">
            <div class="msg bot">¡Hola Adam! Soy tu IA de Brawl Stars. Pídeme consejos para subir copas o estrategias de mapas.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe tu duda..." onkeypress="if(event.key==='Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">ENVIAR</button>
        </div>
    </div>

    <script>
        // === PEGA TU API KEY AQUÍ ABAJO ===
        const MI_API_KEY = "AIzaSyCmo6OVr731Z3UJ5gg8jb11aUQpRvGaYTc"; 
        // =================================

        async function enviarMensaje() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const texto = input.value.trim();
            
            if (!texto) return;

            // Mostrar mensaje del usuario
            chatBox.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Mostrar que la IA está "pensando"
            const tempId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${tempId}" class="msg bot" style="opacity: 0.5;">Escribiendo...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${MI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: "Eres un experto profesional en el juego Brawl Stars. Responde de forma breve, épica y con consejos tácticos a esto: " + texto }] 
                        }]
                    })
                });

                const data = await response.json();
                
                // Quitar el mensaje de carga
                document.getElementById(tempId).remove();

                if (data.error) {
                    chatBox.innerHTML += `<div class="msg bot" style="color:#ff4444">⚠️ Error de API: ${data.error.message}</div>`;
                } else {
                    const respuestaIA = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="msg bot">🤖 ${respuestaIA}</div>`;
                }
            } catch (error) {
                document.getElementById(tempId).remove();
                chatBox.innerHTML += `<div class="msg bot" style="color:#ff4444">⚠️ Error de conexión. Revisa tu internet o tu API Key.</div>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
