<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Hub AI | AdamChliah</title>
    <style>
        :root { --gold: #f3ca10; --cyan: #00e5ff; --dark: #0f0f12; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        
        h1 { color: var(--gold); text-align: center; font-size: 2.5rem; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }

        /* GRID DE BRAWLERS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: #1c1c21; border-radius: 20px; padding: 15px; border: 1px solid #333; text-align: center; }
        .brawler-img { width: 100px; height: 100px; object-fit: contain; }

        /* VENTANA DE CHAT FLOTANTE */
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 320px; background: #1c1c21; border: 2px solid var(--cyan); border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        #chat-box { height: 250px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; border-bottom: 1px solid #333; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; }
        .bot { background: #333; align-self: flex-start; }
        .user { background: var(--cyan); color: black; align-self: flex-end; }
        
        .chat-input-area { display: flex; padding: 10px; gap: 5px; }
        input { flex: 1; padding: 8px; border-radius: 5px; border: none; outline: none; }
        button { background: var(--cyan); border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>BRAWL <span style="color:white">HUB</span> AI</h1>
    <p class="subtitle">Desarrollado por @adamchliah90</p>

    <div class="grid">
        <div class="card">
            <img src="https://www.brawlstarsdps.com/images/brawlers/edgar.webp" class="brawler-img">
            <h3>Edgar</h3>
        </div>
        <div class="card">
            <img src="https://www.brawlstarsdps.com/images/brawlers/mortis.webp" class="brawler-img">
            <h3>Mortis</h3>
        </div>
        <div class="card">
            <img src="https://www.brawlstarsdps.com/images/brawlers/leon.webp" class="brawler-img">
            <h3>Leon</h3>
        </div>
    </div>

    <div id="chat-container">
        <div style="background:var(--cyan); color:black; padding:10px; font-weight:bold; border-radius:12px 12px 0 0;">🤖 BRAWL IA ADVISOR</div>
        <div id="chat-box">
            <div class="msg bot">¡Hola Adam! Soy tu IA de Brawl Stars. ¿A quién quieres derrotar hoy?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe aquí...">
            <button onclick="enviarMensaje()">ENVIAR</button>
        </div>
    </div>

    <script>
        // PEGA TU API KEY ENTRE LAS COMILLAS
        const MI_API_KEY = "AIzaSyDGvvv2hnD2-THssOT9JR3q3QiKH_p_azw"; 

        async function enviarMensaje() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const texto = input.value;
            if (!texto) return;

            // Mostrar mensaje del usuario
            chatBox.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Eres un experto en Brawl Stars. Responde breve y épico a esto: " + texto }] }]
                    })
                });
                const data = await response.json();
                const respuestaIA = data.candidates[0].content.parts[0].text;

                chatBox.innerHTML += `<div class="msg bot">🤖 ${respuestaIA}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red">Error de conexión.</div>`;
            }
        }
    </script>
</body>
</html>
